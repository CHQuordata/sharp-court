name = "sportsedge-proxy"
main = "index.js"
compatibility_date = "2024-09-23"

[vars]
# Secrets — set via wrangler CLI:
#   wrangler secret put PINNACLE_USER
#   wrangler secret put PINNACLE_PWD
#   wrangler secret put ODDS_API_KEY    ← needed for nightly score cron
#   wrangler secret put CLAUDE_API_KEY  ← needed for nightly learning agent

# KV namespace — create with:
#   wrangler kv:namespace create "LEARNING_STORE"
# Then paste the returned id below.
[[kv_namespaces]]
binding = "LEARNING_STORE"
id = "e1d175f193354749bff5860783b014e5"

# Nightly cron: 7 AM UTC = 3 AM ET
[triggers]
crons = ["0 7 * * *"]
